services:
  # sglang backend engine
  sglang-server:
    image: lmsysorg/sglang:latest
    # booting Qwen-0.5B 
    command: ["python3", "-m", "sglang.launch_server", "--model-path", "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B", "--port", "8000", "--host", "0.0.0.0"]
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  # agent frontend env
  agent:
    build: .
    volumes:
      - .:/app  # for live code editing
    depends_on:
      sglang-server:
        condition: service_healthy
    command: ["uv", "run", "agent.py"]